name: Dealy
options:
  bundleIdPrefix: com.dealy
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Dealy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Dealy
        excludes:
          - "Resources/Dealy-source.png"   # kept as reference art, not bundled
          - "Resources/Info.plist"          # referenced via INFOPLIST_FILE, not a resource
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dealy.app
        PRODUCT_NAME: Dealy
        INFOPLIST_FILE: Dealy/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_PREVIEWS: YES

  DealyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - DealyTests
    dependencies:
      - target: Dealy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dealy.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  Dealy:
    build:
      targets:
        Dealy: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DealyTests
    profile:
      config: Release
    archive:
      config: Release

# Local development backing services for Dealy.
# Ports are offset (5433/6380/7700) to avoid clashing with other local stacks
# (e.g. an existing Supabase instance on 5432).
services:
  postgres:
    # arm64-native PostGIS (postgis/postgis is amd64-only → unstable under colima emulation).
    image: ghcr.io/baosystems/postgis:16-3.4
    container_name: dealy_postgres
    environment:
      POSTGRES_USER: dealy
      POSTGRES_PASSWORD: dealy
      POSTGRES_DB: dealy
    ports:
      - '5434:5432'
    volumes:
      - dealy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dealy -d dealy']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dealy_redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6381:6379'
    volumes:
      - dealy_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: dealy_meilisearch
    environment:
      MEILI_MASTER_KEY: dealy_dev_master_key_change_me
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - dealy_meilidata:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dealy_pgdata:
  dealy_redisdata:
  dealy_meilidata:

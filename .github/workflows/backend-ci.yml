name: backend-ci

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dealy
          POSTGRES_PASSWORD: dealy
          POSTGRES_DB: dealy
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U dealy -d dealy"
          --health-interval 5s --health-timeout 5s --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: ci_master_key
          MEILI_ENV: development
        ports: ['7700:7700']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://dealy:dealy@localhost:5433/dealy?schema=public
      DIRECT_DATABASE_URL: postgresql://dealy:dealy@localhost:5433/dealy?schema=public
      MEILISEARCH_HOST: http://localhost:7700
      MEILISEARCH_MASTER_KEY: ci_master_key
      MEILISEARCH_DEALS_INDEX: deals
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      # Migration check: schema applies cleanly to a fresh PostGIS database.
      - run: pnpm prisma migrate deploy
      - run: pnpm seed

      - name: Wait for Meilisearch
        run: for i in $(seq 1 30); do curl -fsS http://localhost:7700/health && break; sleep 2; done
      - run: pnpm search:reindex

      - run: pnpm test
      - run: pnpm test:e2e

  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action lists PR commits via the API; without these it 403s.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
